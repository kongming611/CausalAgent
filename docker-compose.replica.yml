# CausalChat MySQL 主从开发

services:
  mysql-primary:
    build:
      context: ./Database/mysql
      dockerfile: Dockerfile.primary
    container_name: causalchat_mysql_primary
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_WRITE_USER: ${MYSQL_WRITE_USER:-${MYSQL_USER}}
      MYSQL_WRITE_PASSWORD: ${MYSQL_WRITE_PASSWORD:-${MYSQL_PASSWORD}}
      MYSQL_READ_USER: ${MYSQL_READ_USER:-${MYSQL_USER}}
      MYSQL_READ_PASSWORD: ${MYSQL_READ_PASSWORD:-${MYSQL_PASSWORD}}
      MYSQL_REPLICA_STATUS_USER: ${MYSQL_REPLICA_STATUS_USER:-}
      MYSQL_REPLICA_STATUS_PASSWORD: ${MYSQL_REPLICA_STATUS_PASSWORD:-}
      MYSQL_REPLICATION_USER: ${MYSQL_REPLICATION_USER:-replica}
      MYSQL_REPLICATION_PASSWORD: ${MYSQL_REPLICATION_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_primary_data:/var/lib/mysql
    networks:
      - causalchat_replica_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysql-replica:
    build:
      context: ./Database/mysql
      dockerfile: Dockerfile.replica
    container_name: causalchat_mysql_replica
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_REPLICATION_USER: ${MYSQL_REPLICATION_USER:-replica}
      MYSQL_REPLICATION_PASSWORD: ${MYSQL_REPLICATION_PASSWORD}
    ports:
      - "3308:3306"
    volumes:
      - mysql_replica_data:/var/lib/mysql
    networks:
      - causalchat_replica_network
    depends_on:
      mysql-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: causalchat_app
    environment:
      - MYSQL_HOST=mysql-primary
      - MYSQL_WRITE_HOST=mysql-primary
      - MYSQL_READ_HOSTS=mysql-replica
      - MYSQL_PORT=3306
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_WRITE_USER=${MYSQL_WRITE_USER:-${MYSQL_USER}}
      - MYSQL_WRITE_PASSWORD=${MYSQL_WRITE_PASSWORD:-${MYSQL_PASSWORD}}
      - MYSQL_READ_USER=${MYSQL_READ_USER:-${MYSQL_USER}}
      - MYSQL_READ_PASSWORD=${MYSQL_READ_PASSWORD:-${MYSQL_PASSWORD}}
      - MYSQL_REPLICA_STATUS_USER=${MYSQL_REPLICA_STATUS_USER:-}
      - MYSQL_REPLICA_STATUS_PASSWORD=${MYSQL_REPLICA_STATUS_PASSWORD:-}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_POOL_SIZE_WRITE=${MYSQL_POOL_SIZE_WRITE:-5}
      - MYSQL_POOL_SIZE_READ=${MYSQL_POOL_SIZE_READ:-5}
      - MYSQL_REPLICA_MAX_LAG_SECONDS=${MYSQL_REPLICA_MAX_LAG_SECONDS:-2}
      - MYSQL_QUERY_WARN_MS=${MYSQL_QUERY_WARN_MS:-500}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-20}
      - API_KEY=${API_KEY}
      - BASE_URL=${BASE_URL}
      - MODEL=${MODEL}
      - SECRET_KEY=${SECRET_KEY}
      - FLASK_ENV=development
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-}
    ports:
      - "5001:5001"
    volumes:
      - .:/app
      - /app/__pycache__
      - /app/杂项
      - ./Agent/knowledge_base/models:/app/Agent/knowledge_base/models:ro
      - ./Agent/knowledge_base/db:/app/Agent/knowledge_base/db
    depends_on:
      mysql-primary:
        condition: service_healthy
      mysql-replica:
        condition: service_healthy
    networks:
      - causalchat_replica_network
    restart: unless-stopped

networks:
  causalchat_replica_network:
    driver: bridge

volumes:
  mysql_primary_data:
    driver: local
  mysql_replica_data:
    driver: local
